# Tiny Tapeout project information (Wokwi project)
project:
  title:        "Simple Sprinkler"      # Project title
  author:       "Noah Perez"      # Your name
  discord:      "infamousnzp"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "I designed a Binary to Hexidecimal Decoder using a seven-segment LED display that takes inputs A - D and outputs a hexidecimal value between 1 - F."      # One line description of what your project does
  language:     "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)
  wokwi_id:     451813217808899073       # Set this to the ID of your Wokwi project (the number from the project's URL)

  # How many tiles your design occupies? A single tile is about 340x160 uM.    
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

how_it_works:  "The system receives a 4-bit binary input representing a hexadecimal value
                between 1 and F. Based solely on the current input combination, the system
                must determine which of the seven LED segments should be illuminated to correctly
                display the corresponding hexadecimal character.

                The system produces seven binary outputs, each corresponding to a specific LED 
                segment. A segment is illuminated when its output is logic high (1) and dimmed 
                when its output is logic low (0). Combinations of inputs are defined in the 
                truth table."
how_to_test:  "Adjust the inputs to see which combinations toggle numbers or letters.
               The truth table and kmaps are included in README.md."
external_hw: "None"

